<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Left No Crumbs Pub Quiz</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@500;700&display=swap');

  :root {
    --blue:   #2B3FFF;
    --white:  #FFFFFF;
    --pink:   #E8437A;
    --orange: #F06030;
    --yellow: #F5C842;
    --purple: #8B2D8B;
    --red:    #C8213A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══ GRAIN OVERLAY ══ */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 999;
    mix-blend-mode: multiply;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  /* ══ BACKGROUNDS — each screen gets its own gradient ══ */

  /* Select: warm pink-orange-red swirl */
  #screen-select {
    background:
      radial-gradient(ellipse 70% 50% at 20% 10%, #F5C842 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 85% 30%, #E8437A 0%, transparent 55%),
      radial-gradient(ellipse 80% 60% at 50% 80%, #C8213A 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 70%, #F06030 0%, transparent 50%),
      #D63060;
  }

  /* Answers: purple-pink-orange */
  #screen-answers {
    background:
      radial-gradient(ellipse 60% 50% at 80% 5%, #F06030 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 15% 40%, #8B2D8B 0%, transparent 55%),
      radial-gradient(ellipse 50% 70% at 60% 85%, #E8437A 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 90% 70%, #F5C842 0%, transparent 40%),
      #C0285A;
  }

  /* Waiting: deep red-purple */
  #screen-waiting {
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, #F06030 0%, transparent 50%),
      radial-gradient(ellipse 50% 60% at 10% 60%, #E8437A 0%, transparent 50%),
      radial-gradient(ellipse 60% 50% at 80% 80%, #8B2D8B 0%, transparent 50%),
      #8B1A3A;
  }

  /* Scores: yellow-pink-purple */
  #screen-scores {
    background:
      radial-gradient(ellipse 70% 50% at 80% 10%, #F5C842 0%, transparent 55%),
      radial-gradient(ellipse 60% 60% at 20% 35%, #E8437A 0%, transparent 50%),
      radial-gradient(ellipse 60% 50% at 50% 85%, #8B2D8B 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 5% 10%, #F06030 0%, transparent 40%),
      #B82060;
  }

  /* ══ HEADER ══ */
  .page-header {
    padding: 36px 20px 24px;
  }
  .site-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }
  .page-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 3.8rem;
    line-height: 0.9;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  .page-subtitle {
    font-size: 0.88rem;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* ══ NAME GRID ══ */
  .name-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 16px 30px;
  }
  .name-tile {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 14px;
    padding: 22px 14px 18px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
  }
  .name-tile:not(.taken):hover {
    background: rgba(255,255,255,0.28);
    border-color: var(--blue);
    transform: translateY(-3px);
  }
  .name-tile:not(.taken):active {
    transform: translateY(1px);
    background: rgba(43,63,255,0.25);
  }
  .name-tile.taken {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .name-tile .tile-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .name-tile .quiz-name {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.8);
    margin-top: 6px;
    font-weight: 700;
    font-style: italic;
  }
  .taken-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
    opacity: 0.6;
  }

  /* ══ MODAL ══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(139,45,139,0.6);
    backdrop-filter: blur(8px);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%; max-width: 360px;
    text-align: center;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 2rem;
    color: var(--blue); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .modal p { color: #888; font-size: 0.88rem; margin-bottom: 20px; font-weight: 500; }
  .modal input {
    width: 100%; background: #F5F0FF;
    border: 2px solid #E0D0FF; border-radius: 12px;
    padding: 14px 16px; color: #1A1A2E;
    font-family: 'Barlow', sans-serif; font-size: 1rem; font-weight: 700;
    outline: none; text-align: center;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--blue); }
  .modal input::placeholder { color: #BBA8DD; font-weight: 500; }
  .modal-buttons { display: flex; gap: 10px; margin-top: 14px; }
  .btn {
    flex: 1; padding: 14px;
    border: none; border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #1830DD; }
  .btn-ghost { background: #F0EEF8; color: #666; }

  /* ══ ROUND BANNER ══ */
  .round-banner {
    margin: 0 16px 16px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .round-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 2rem;
    color: var(--blue); text-transform: uppercase;
  }
  .player-chip {
    background: var(--blue); color: white;
    border-radius: 20px; padding: 6px 14px;
    font-size: 0.8rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ══ ANSWERS ══ */
  .answers-container { padding: 0 16px 8px; }
  .answer-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .q-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 1rem;
    color: var(--blue); min-width: 28px;
  }
  .answer-input {
    flex: 1;
    background: rgba(255,255,255,0.9);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 10px;
    padding: 12px 14px;
    color: #1A1A2E;
    font-family: 'Barlow', sans-serif; font-size: 0.95rem; font-weight: 700;
    outline: none; transition: all 0.15s;
  }
  .answer-input:focus {
    background: white;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(43,63,255,0.2);
  }
  .answer-input:disabled { opacity: 0.5; }
  .answer-input::placeholder { color: #AAA; font-weight: 500; }

  .submit-bar {
    position: sticky; bottom: 0;
    padding: 14px 16px 20px;
    background: linear-gradient(to top, rgba(192,40,90,0.95) 70%, transparent);
  }
  .btn-submit {
    width: 100%; padding: 18px;
    background: var(--blue); color: white;
    border: none; border-radius: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 900;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-submit:hover { background: #1830DD; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(1px); }
  .btn-submit:disabled { background: rgba(255,255,255,0.25); color: rgba(255,255,255,0.5); cursor: not-allowed; transform: none; }

  /* ══ WAITING ══ */
  .waiting-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 80vh; padding: 40px 24px; text-align: center;
  }
  .wait-ring {
    width: 80px; height: 80px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 32px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .waiting-screen h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 2.8rem;
    color: var(--blue); text-transform: uppercase;
    line-height: 0.95; margin-bottom: 12px;
  }
  .waiting-screen p {
    color: rgba(255,255,255,0.75);
    font-size: 0.9rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* ══ SCORES ══ */
  .score-screen { padding: 0 16px 40px; }

  .your-score-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 18px;
    padding: 30px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .score-round-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .big-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 7rem;
    color: var(--blue); line-height: 1;
    text-transform: uppercase; margin: 4px 0;
  }
  .cumulative-score {
    font-size: 0.82rem; font-weight: 700;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .cumulative-score strong { color: white; }

  .lb-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 1.5rem;
    color: var(--blue); text-transform: uppercase;
    margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .lb-row {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(4px);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px;
    animation: slideIn 0.35s ease both;
  }
  .lb-row.me {
    background: rgba(43,63,255,0.25);
    border-color: var(--blue);
  }
  @keyframes slideIn {
    from { transform: translateX(-18px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .lb-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 1.2rem;
    color: white; min-width: 36px;
  }
  .lb-name {
    flex: 1; font-weight: 700; font-size: 0.9rem;
    color: white; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .lb-scores { text-align: right; }
  .lb-round-pts { font-size: 0.7rem; color: rgba(255,255,255,0.55); font-weight: 700; text-transform: uppercase; }
  .lb-total-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 1.3rem; color: var(--blue);
  }
  .auto-tag {
    font-size: 0.58rem; background: rgba(255,255,255,0.2);
    color: white; border-radius: 4px; padding: 1px 5px;
    font-weight: 700; margin-left: 4px; vertical-align: middle;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .bonus-tag {
    font-size: 0.58rem; background: var(--blue);
    color: white; border-radius: 4px; padding: 1px 5px;
    font-weight: 700; margin-left: 4px; vertical-align: middle;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* ══ TOAST ══ */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--blue); color: white;
    padding: 13px 26px; border-radius: 30px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 1rem;
    letter-spacing: 1px; text-transform: uppercase;
    z-index: 1000; transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ NAME SELECT ══ -->
<div id="screen-select" class="screen active">
  <div class="page-header">
    <div class="site-label">Left No Crumbs</div>
    <div class="page-title">Pub<br>Quiz</div>
    <div class="page-subtitle">Select your name to join</div>
  </div>
  <div class="name-grid" id="name-grid"></div>
</div>

<!-- ══ ANSWERS ══ -->
<div id="screen-answers" class="screen">
  <div class="page-header" style="padding-bottom:14px">
    <div class="site-label">Left No Crumbs</div>
    <div class="page-title" style="font-size:2.6rem" id="round-title">Round 1</div>
  </div>
  <div class="round-banner">
    <span class="round-label" id="round-label">Round 1</span>
    <span class="player-chip" id="player-chip">You</span>
  </div>
  <div class="answers-container" id="answers-container"></div>
  <div class="submit-bar">
    <button class="btn-submit" id="submit-btn" onclick="submitAnswers()">Submit Answers</button>
  </div>
</div>

<!-- ══ WAITING ══ -->
<div id="screen-waiting" class="screen">
  <div class="waiting-screen">
    <div class="wait-ring"></div>
    <h2 id="waiting-title">Answers<br>Locked In</h2>
    <p id="waiting-msg">Waiting for the host to mark</p>
  </div>
</div>

<!-- ══ SCORES ══ -->
<div id="screen-scores" class="screen">
  <div class="page-header">
    <div class="site-label">Left No Crumbs</div>
    <div class="page-title">Results</div>
  </div>
  <div class="score-screen">
    <div class="your-score-card">
      <div class="score-round-label" id="score-round-label">Round 1 Score</div>
      <div class="big-score" id="your-round-score">0</div>
      <div class="cumulative-score">Total: <strong id="your-total-score">0</strong> pts</div>
    </div>
    <div class="lb-title">Leaderboard</div>
    <div id="leaderboard-list"></div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Your Quiz Name</h2>
    <p id="modal-sub">Make it legendary</p>
    <input type="text" id="quiz-name-input" placeholder="e.g. The Quiz Khalifa" maxlength="30" />
    <div class="modal-buttons">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmName()">Join</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAYERS = [
  { id: 'mia',    name: 'Mia'    },
  { id: 'james',  name: 'James'  },
  { id: 'olivia', name: 'Olivia' },
  { id: 'ciaran', name: 'Ciaran' },
  { id: 'tom',    name: 'Tom'    },
  { id: 'jess',   name: 'Jess'   },
];
const AUTO_SCORE_ROUNDS = { 0: 'jess', 1: 'jess', 2: 'tom', 3: 'tom', 4: 'tom' };
const TOTAL_ROUNDS = 5;
const QUESTIONS_PER_ROUND = 10;

let myPlayerId = null, myQuizName = null, pendingPlayerId = null;
let currentRound = 0, hasSubmitted = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0,0);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function buildGrid(takenMap, quizNames) {
  const grid = document.getElementById('name-grid');
  grid.innerHTML = '';
  PLAYERS.forEach(p => {
    const taken = takenMap[p.id];
    const div = document.createElement('div');
    div.className = 'name-tile' + (taken ? ' taken' : '');
    div.innerHTML = `
      <div class="tile-name">${p.name}</div>
      ${quizNames[p.id] ? `<div class="quiz-name">"${quizNames[p.id]}"</div>` : ''}
      ${taken ? '<div class="taken-label">Taken</div>' : ''}
    `;
    if (!taken) div.onclick = () => openModal(p.id, p.name);
    grid.appendChild(div);
  });
}

function openModal(playerId, playerName) {
  pendingPlayerId = playerId;
  document.getElementById('modal-title').textContent = `Hey, ${playerName}`;
  document.getElementById('quiz-name-input').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('quiz-name-input').focus(), 100);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  pendingPlayerId = null;
}
document.getElementById('quiz-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmName(); });

async function confirmName() {
  const input = document.getElementById('quiz-name-input').value.trim();
  if (!input) { showToast('Enter a name first'); return; }
  myPlayerId = pendingPlayerId; myQuizName = input;
  closeModal();
  await db.ref(`players/${myPlayerId}`).set({
    realName: PLAYERS.find(p => p.id === myPlayerId).name,
    quizName: myQuizName, claimed: true, scores: {}, bonuses: {}
  });
  const snap = await db.ref('game').get();
  currentRound = (snap.val() || {}).currentRound ?? 0;
  enterRound(currentRound);
}

function enterRound(roundIndex) {
  currentRound = roundIndex; hasSubmitted = false;
  if (AUTO_SCORE_ROUNDS[roundIndex] === myPlayerId) {
    document.getElementById('waiting-title').textContent = `Hosting\nRound ${roundIndex + 1}`;
    document.getElementById('waiting-msg').textContent = `You will receive the average score automatically`;
    showScreen('waiting');
  } else {
    buildAnswerScreen(roundIndex);
    showScreen('answers');
  }
}

function buildAnswerScreen(roundIndex) {
  document.getElementById('round-title').textContent = `Round ${roundIndex + 1}`;
  document.getElementById('round-label').textContent = `Round ${roundIndex + 1}`;
  document.getElementById('player-chip').textContent = myQuizName || 'You';
  const container = document.getElementById('answers-container');
  container.innerHTML = '';
  for (let i = 1; i <= QUESTIONS_PER_ROUND; i++) {
    const row = document.createElement('div');
    row.className = 'answer-row';
    row.innerHTML = `<span class="q-label">Q${i}</span><input class="answer-input" id="ans-${i}" type="text" placeholder="Your answer" autocomplete="off" />`;
    container.appendChild(row);
  }
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'Submit Answers';
}

async function submitAnswers() {
  if (hasSubmitted) return;
  const answers = {};
  for (let i = 1; i <= QUESTIONS_PER_ROUND; i++) {
    answers[`q${i}`] = document.getElementById(`ans-${i}`).value.trim() || '';
    document.getElementById(`ans-${i}`).disabled = true;
  }
  hasSubmitted = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = 'Submitted';
  await db.ref(`rounds/round${currentRound}/answers/${myPlayerId}`).set(answers);
  document.getElementById('waiting-title').textContent = `Answers\nLocked In`;
  document.getElementById('waiting-msg').textContent = `Waiting for the host to mark`;
  showScreen('waiting');
}

function listenForScores() {
  db.ref('game').on('value', snap => {
    const game = snap.val(); if (!game) return;
    const round = game.currentRound ?? 0;
    const phase = game.phase ?? 'answering';
    if (phase === 'scores' && round === currentRound) loadAndShowScores(round);
    else if (phase === 'answering' && round > currentRound) enterRound(round);
  });
}

async function loadAndShowScores(roundIndex) {
  const scoresSnap = await db.ref(`rounds/round${roundIndex}/scores`).get();
  const allScores = scoresSnap.val() || {};
  const playersSnap = await db.ref('players').get();
  const playersData = playersSnap.val() || {};

  document.getElementById('score-round-label').textContent = `Round ${roundIndex + 1}`;
  document.getElementById('your-round-score').textContent = formatScore(allScores[myPlayerId] ?? 0);
  document.getElementById('your-total-score').textContent = formatScore(computeCumulative(playersData, roundIndex, myPlayerId));

  const rows = PLAYERS.map(p => ({
    id: p.id,
    qName: playersData[p.id]?.quizName || p.name,
    roundScore: allScores[p.id] ?? 0,
    cum: computeCumulative(playersData, roundIndex, p.id),
    isAuto: AUTO_SCORE_ROUNDS[roundIndex] === p.id,
    roundBonus: playersData[p.id]?.bonuses?.[`round${roundIndex}`] ?? 0,
  })).sort((a, b) => b.cum - a.cum);

  const list = document.getElementById('leaderboard-list');
  list.innerHTML = '';
  rows.forEach((row, idx) => {
    const isMe = row.id === myPlayerId;
    const div = document.createElement('div');
    div.className = `lb-row ${isMe ? 'me' : ''}`;
    div.style.animationDelay = `${idx * 0.07}s`;
    const rank = ['1.','2.','3.','4.','5.','6.'][idx];
    div.innerHTML = `
      <div class="lb-rank">${rank}</div>
      <div class="lb-name">${row.qName}${row.isAuto ? '<span class="auto-tag">Auto</span>' : ''}${row.roundBonus ? '<span class="bonus-tag">+Bonus</span>' : ''}${isMe ? ' &larr;' : ''}</div>
      <div class="lb-scores">
        <div class="lb-round-pts">+${formatScore(row.roundScore)}</div>
        <div class="lb-total-pts">${formatScore(row.cum)}</div>
      </div>
    `;
    list.appendChild(div);
  });
  showScreen('scores');
}

function computeCumulative(playersData, upToRound, playerId) {
  const p = playersData[playerId]; if (!p) return 0;
  let total = 0;
  for (let i = 0; i <= upToRound; i++) {
    total += p.scores?.[`round${i}`] ?? 0;
    total += p.bonuses?.[`round${i}`] ?? 0;
  }
  return Math.round(total * 10) / 10;
}
function formatScore(n) {
  if (typeof n !== 'number') return '0';
  const r = Math.round(n * 10) / 10;
  return Number.isInteger(r) ? r.toString() : r.toFixed(1);
}

async function init() {
  db.ref('players').on('value', snap => {
    const data = snap.val() || {};
    const takenMap = {}, quizNames = {};
    Object.keys(data).forEach(id => {
      if (data[id].claimed) takenMap[id] = true;
      if (data[id].quizName) quizNames[id] = data[id].quizName;
    });
    if (!myPlayerId) buildGrid(takenMap, quizNames);
  });
  listenForScores();
}
init();
</script>
